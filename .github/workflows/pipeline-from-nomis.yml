name: Pipeline From NOMIS [test -> build -> deploy]
on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      additional_docker_tag:
        description: Additional docker tag that can be used to specify stable or testing tags
        required: false
        default: ''
        type: string
      push:
        description: Push docker image to registry flag
        required: true
        default: false
        type: boolean
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
concurrency:
  # only cancel in progress when on a branch - use SHA on main to ensure uniqueness
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  helm_lint:
    strategy:
      matrix:
        environments: ['dev', 'preprod', 'prod']
    name: helm lint for from-nomis
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/test_helm_lint.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: ${{ matrix.environments }}
      chart_name: 'from-nomis'
      helm_dir: 'from-nomis/helm_deploy'
  app_version:
    name: Calculate application version for from-nomis
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.app_version.outputs.version }}
    steps:
      - id: app_version
        name: Application version creators
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/build-test-and-deploy/create_app_version@cd5eb88ee6b73a22548a64b8c7358a3bedc9516f # v1.0.13
  gradle-build:
    name: Gradle verify for from-nomis
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/gradle_verify.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      gradle-command: 'BUILD_NUMBER=${{ needs.app_version.outputs.version}} ./gradlew :from-nomis:assemble :from-nomis:ktlintCheck'
      upload-test-artifacts: false
      upload-build-artifacts: ${{ github.ref == 'refs/heads/main' }}
      java-version: "25"
      build-dir: 'from-nomis/build'
      artifact-name: 'from-nomis'
    needs:
      - app_version
  setup-test-matrix:
    name: Create test matrix
    uses: ./.github/workflows/setup_test_matrix.yml # LOCAL_VERSION
    secrets: inherit
  gradle-verify:
    name: Run the tests for from-nomis
    strategy:
      matrix: ${{ fromJson(needs.setup-test-matrix.outputs.matrix) }}
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/gradle_verify.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      gradle-command: ./gradlew ${{ matrix.tests }}
      localstack-tag: "4"
      postgres-tag: "18"
      postgres-username: "migration"
      postgres-password: "migration"
      postgres-db: 'migration'
      artifact-name: ${{ matrix.tests }}
      java-version: "25"
    needs:
      - gradle-build
      - setup-test-matrix
  build:
    name: Build docker image from hmpps-github-actions
    if: github.ref == 'refs/heads/main'
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/docker_build.yml@v2 # WORKFLOW_VERSION
    needs:
      - gradle-verify
    with:
      docker_registry: 'ghcr.io'
      registry_org: 'ministryofjustice'
      additional_docker_tag: ${{ inputs.additional_docker_tag }}
      push: ${{ inputs.push || inputs.push == null }}
      docker_multiplatform: false
      file: 'from-nomis/Dockerfile'
      image_name: 'from-nomis'
      download_build_artifacts: true
      generate_sbom: true
      attach_sbom_to_registry: true
      sign_image: true
  deploy_dev:
    name: Deploy to the dev environment
    needs:
      - build
      - helm_lint
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'dev'
      app_version: '${{ needs.build.outputs.app_version }}'
      k8s_deployment_name: 'from-nomis'
      helm_chart_name: 'from-nomis'
      helm_dir: 'from-nomis/helm_deploy'
  deploy_preprod:
    name: Deploy to the preprod environment
    needs:
      - build
      - helm_lint
      - deploy_dev
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'preprod'
      app_version: '${{ needs.build.outputs.app_version }}'
      k8s_deployment_name: 'from-nomis'
      helm_chart_name: 'from-nomis'
      helm_dir: 'from-nomis/helm_deploy'
  deploy_prod:
    name: Deploy to the prod environment
    needs:
      - build
      - helm_lint
      - deploy_preprod
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'prod'
      app_version: '${{ needs.build.outputs.app_version }}'
      k8s_deployment_name: 'from-nomis'
      helm_chart_name: 'from-nomis'
      helm_dir: 'from-nomis/helm_deploy'
